<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JobDeck | Login</title>
    <link rel="icon" href="../public/logoImage/logo-2.png" />
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-gray-50 flex min-h-screen items-center justify-center p-4 font-sans"
  >
    <div
      class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-100 p-8 space-y-6"
    >
      <!-- JobDeck Logo & Header Section -->
      <div class="flex flex-col items-center text-center space-y-2">
        <!-- Custom SVG Logo -->
        <div
          class="h-12 w-12 bg-blue-600 rounded-xl flex items-center justify-center shadow-md shadow-blue-200"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="2.5"
            stroke="white"
            class="w-7 h-7"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M2.25 21h19.5m-18-18v18m10.5-18v18m6-13.5V21M6.75 6.75h.75m-.75 3h.75m-.75 3h.75m3-6h.75m-.75 3h.75m-.75 3h.75M6.75 21v-3.375c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21M3 3h12a.75.75 0 0 1 .75.75V21M4.5 7.5h1.5M4.5 10.5h1.5M4.5 13.5h1.5M21 21V10.5m-3.75 3h.75m-.75 3h.75M18 21v-3.375c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21"
            />
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 tracking-tight mt-2">
          JobDeck
        </h1>
        <p class="text-sm text-gray-500">
          Welcome back! Please enter your details.
        </p>
      </div>

      <!-- Login Form -->
      <form action="#" method="POST" class="space-y-4">
        <!-- Email Input -->
        <div>
          <label
            for="email"
            class="block text-sm font-medium text-gray-700 mb-1"
            >Email Address</label
          >
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="you@example.com"
            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-gray-900 text-sm"
          />
        </div>

        <!-- Password Input -->
        <div>
          <div class="flex justify-between items-center mb-1">
            <label
              for="password"
              class="block text-sm font-medium text-gray-700"
              >Password</label
            >
            <a
              href="#"
              class="text-xs font-semibold text-blue-600 hover:text-blue-500 hover:underline"
              >Forgot password?</a
            >
          </div>
          <input
            type="password"
            id="password"
            name="password"
            required
            placeholder="••••••••"
            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-gray-900 text-sm"
          />
        </div>

        <!-- Remember Me Checkbox -->
        <div class="flex items-center">
          <input
            type="checkbox"
            id="remember"
            name="remember"
            class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded cursor-pointer"
          />
          <label
            for="remember"
            class="ml-2 block text-sm text-gray-600 select-none cursor-pointer"
            >Remember me for 30 days</label
          >
        </div>

        <!-- Sign In Button -->
        <button
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-lg shadow-sm hover:shadow transition-all duration-150 text-sm"
        >
          Sign in
        </button>
      </form>

      <div class="relative flex py-2 items-center">
        <div class="flex-grow border-t border-gray-200"></div>
        <span
          class="flex-shrink mx-4 text-xs text-gray-400 uppercase tracking-wider"
          >Or continue with</span
        >
        <div class="flex-grow border-t border-gray-200"></div>
      </div>

      <!-- Social Login (Google) -->
      <button
        type="button"
        class="w-full flex items-center justify-center gap-2 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-medium py-2.5 px-4 rounded-lg shadow-sm transition-all duration-150 text-sm"
      >
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            fill="#4285F4"
          />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853"
          />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"
            fill="#FBBC05"
          />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            fill="#EA4335"
          />
        </svg>
        Sign in with Google
      </button>

      <!-- Footer Sign Up Link -->
      <p class="text-center text-sm text-gray-600 mt-4">
        Don't have an account?
        <a
          href="#"
          class="font-semibold text-blue-600 hover:text-blue-500 hover:underline"
          >Sign up</a
        >
      </p>
    </div>
  </body>
</html>
